version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: imso
      POSTGRES_USER: imso
      POSTGRES_PASSWORD: imso_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://imso:imso_secret@db:5432/imso
      DJANGO_SECRET_KEY: changeme_in_prod
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis

volumes:
  pgdata:
