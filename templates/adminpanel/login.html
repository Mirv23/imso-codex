<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMSO Haiti — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2D6A4F; --primary-600: #245742; --primary-light: #E8F5EE;
  --text: #111827; --muted: #6B7280; --border: #E5E7EB;
  --bg: #F7F8FA; --card: #FFFFFF;
  --radius: 12px; --radius-lg: 16px;
  --shadow-md: 0 4px 14px -2px rgba(17,24,39,0.06), 0 2px 4px rgba(17,24,39,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--text); background: var(--bg); font-size: 14px; line-height: 1.45;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
  padding: 40px 32px 32px; width: 100%; max-width: 400px; margin: 20px;
}
.brand {
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px;
}
.logo {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), #3a8862);
  display: grid; place-items: center; color: #fff;
  font-weight: 700; font-size: 16px;
}
.brand-text { font-size: 20px; font-weight: 700; }
h1 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 24px; }
.form-row { margin-bottom: 16px; }
.form-row label {
  display: block; font-size: 13px; font-weight: 600;
  margin-bottom: 6px; color: var(--text);
}
.form-row input {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 9px;
  font-size: 14px; outline: 0; transition: border-color .15s, box-shadow .15s;
}
.form-row input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(45,106,79,0.10);
}
.submit-row { margin-top: 24px; }
.submit-row input {
  width: 100%; padding: 11px; border: 0; border-radius: 9px;
  background: var(--primary); color: #fff; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: background .15s;
}
.submit-row input:hover { background: var(--primary-600); }
.error {
  background: rgba(239,68,68,0.10); color: #B91C1C;
  padding: 10px 14px; border-radius: 8px; font-size: 13px;
  margin-bottom: 16px; text-align: center;
}
.footer {
  text-align: center; font-size: 12px; color: var(--muted);
  margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="logo">I</div>
    <span class="brand-text">IMSO</span>
  </div>
  <h1>Connexion</h1>
  {% if form.errors %}
  <div class="error">Identifiant ou mot de passe incorrect.</div>
  {% endif %}
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="form-row">
      <label for="id_username">Nom d'utilisateur</label>
      <input type="text" name="username" id="id_username" autofocus required>
    </div>
    <div class="form-row">
      <label for="id_password">Mot de passe</label>
      <input type="password" name="password" id="id_password" required>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <div class="submit-row">
      <input type="submit" value="Se connecter">
    </div>
  </form>
  <div class="footer">
    IMSO Haiti &mdash; Panneau d'administration
  </div>
</div>
</body>
</html>
