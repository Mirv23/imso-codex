px rgba(17,24,39,0.08);\n\n    --radius-sm: 8px;\n    --radius: 12px;\n    --radius-lg: 16px;\n  }\n\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;\n    color: var(--text);\n    background: var(--bg);\n    -webkit-font-smoothing: antialiased;\n    font-size: 14px;\n    line-height: 1.45;\n  }\n  button { font-family: inherit; cursor: pointer; }\n  input, textarea, select { font-family: inherit; }\n\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  ::-webkit-scrollbar-thumb { background: #DDE1E6; border-radius: 8px; border: 2px solid var(--bg); }\n  ::-webkit-scrollbar-thumb:hover { background: #C4CAD1; }\n\n  .app { display: flex; min-height: 100vh; }\n  .sidebar {\n    width: var(--sb-w);\n    background: var(--sidebar);\n    border-right: 1px solid var(--border);\n    position: fixed;\n    inset: 0 auto 0 0;\n    display: flex;\n    flex-direction: column;\n    z-index: 30;\n  }\n  .main {\n    margin-left: var(--sb-w);\n    flex: 1;\n    display: flex;\n    flex-direction: column;\n    min-width: 0;\n  }\n  .header {\n    height: var(--hd-h);\n    background: rgba(255,255,255,0.85);\n    backdrop-filter: saturate(140%) blur(10px);\n    border-bottom: 1px solid var(--border);\n    position: sticky;\n    top: 0;\n    z-index: 20;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 0 32px;\n  }\n  .content {\n    padding: 28px 32px 64px;\n    max-width: 1480px;\n    width: 100%;\n  }\n\n  .sb-top { padding: 20px 16px 14px; }\n  .sb-brand { display: flex; align-items: center; gap: 10px; }\n  .sb-logo {\n    width: 34px; height: 34px; border-radius: 9px;\n    background: linear-gradient(135deg, var(--primary) 0%, #3a8862 100%);\n    display: grid; place-items: center;\n    color: #fff; font-weight: 700; font-size: 14px;\n    letter-spacing: 0.5px;\n    box-shadow: 0 2px 6px rgba(45,106,79,0.25);\n  }\n  .sb-name {\n    font-weight: 700; font-size: 15px; letter-spacing: -0.01em;\n  }\n  .sb-tag {\n    background: var(--primary-light); color: var(--primary);\n    font-size: 10.5px; font-weight: 600;\n    padding: 2px 7px; border-radius: 999px;\n    margin-left: 6px;\n    letter-spacing: 0.02em;\n  }\n  .sb-user {\n    display: flex; align-items: center; gap: 10px;\n    padding: 12px 12px;\n    margin: 6px 8px 10px;\n    border-radius: var(--radius);\n    background: #FAFBFC;\n    border: 1px solid var(--border-soft);\n  }\n  .avatar {\n    width: 36px; height: 36px; border-radius: 999px;\n    background: linear-gradient(135deg, var(--primary) 0%, #3a8862 100%);\n    color: #fff; display: grid; place-items: center;\n    font-weight: 600; font-size: 13px;\n    flex-shrink: 0;\n  }\n  .avatar.sm { width: 30px; height: 30px; font-size: 11px; }\n  .avatar.xs { width: 26px; height: 26px; font-size: 10.5px; }\n  .avatar.warm { background: linear-gradient(135deg, #F4A261, #E76F51); }\n  .avatar.blue { background: linear-gradient(135deg, #4F86C6, #3a6ea0); }\n  .avatar.purple { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }\n  .avatar.rose { background: linear-gradient(135deg, #f43f5e, #be123c); }\n  .avatar.teal { background: linear-gradient(135deg, #14b8a6, #0d9488); }\n  .avatar.amber { background: linear-gradient(135deg, #f59e0b, #d97706); }\n\n  .sb-user-meta { line-height: 1.25; min-width: 0; }\n  .sb-user-name { font-size: 13px; font-weight: 600; }\n  .sb-user-role { font-size: 11.5px; color: var(--muted); }\n\n  .sb-section {\n    font-size: 10.5px; font-weight: 600;\n    color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.08em;\n    padding: 10px 20px 6px;\n  }\n  .sb-nav { padding: 0 8px; flex: 1; overflow-y: auto; }\n  .sb-item {\n    display: flex; align-items: center; gap: 11px;\n    padding: 9px 12px; margin: 1px 0;\n    border-radius: 9px;\n    color: var(--text);\n    font-size: 13.5px; font-wei
